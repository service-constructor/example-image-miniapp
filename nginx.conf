# image mini-app: serve the SPA and proxy /service/* to the image-service
# backend (stripping the /service prefix, matching the dev Vite proxy).
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location /service/ {
    rewrite ^/service/(.*)$ /$1 break;
    proxy_pass http://image-service.serviceconstructor.svc.cluster.local:4000;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
